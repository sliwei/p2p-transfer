services:
  p2p-transfer:
    restart: always
    container_name: p2p-transfer
    image: registry.cn-shenzhen.aliyuncs.com/sliwei/p2p-transfer:${TAG}
    env_file:
      - .env
    environment:
      PORT: "3001"
      CLIENT_DIST: /app/static
      # PEER_ID_SECRET、RTC_CONFIG 等放在同目录 .env（CI 的 secrets.ENV），不在此做 ${} 插值
    # volumes:
    #   - ./rtc_config.json:/app/server/rtc_config.json:ro
    networks:
      - proxy

networks:
  proxy:
    external: true