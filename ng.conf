# p2p-transfer → Nginx Proxy Manager 对照用（非 NPM 自动生成的文件路径）
# 部署：容器映射宿主机 3001:3001 后，上游填「能访问到该端口」的地址。
#
# ── NPM Web UI（推荐）──
# Details:
#   Domain Names: 填你的域名，例如 p2p.example.com
#   Scheme: http
#   Forward Hostname / IP:
#     - NPM 与 p2p-transfer 都在宿主机 Docker、未建共用网络时：常用 172.17.0.1 或宿主机内网 IP
#     - 若已将 p2p-transfer 加入 NPM 所在 network：填容器名 p2p-transfer，端口 3001
#   Forward Port: 3001
#   打开: Websockets Support（Socket.IO 必须）
#   可选: Block Common Exploits
#
# SSL：在 NPM 里申请 Let's Encrypt 证书并 Force SSL。
#
# ── 等价 Nginx 片段（自定义配置 / 独立 Nginx 时可参考）──
# 将 YOUR_DOMAIN、YOUR_UPSTREAM 替换为实际值。

